packages:
  - packages/*
  - tools/*
  - private/*
  - '!packages/helloworld'
  - '!packages/hermes-inspector-msggen'
  - '!packages/react-native-bots'
  - '!private/helloworld'

nodeLinker: hoisted
minimumReleaseAge: 10080
minimumReleaseAgeExclude: []

# Dependency lifecycle scripts are denied unless explicitly approved here.
allowBuilds:
  # Required by @electron/packager to download the platform binary it packages.
  electron: true
  # Its install script only prints a funding message; no artifact is required.
  core-js: false

overrides:
  # Resolves a security issue with protobufjs, one of its dependencies.
  '@grpc/proto-loader': ^0.7.8
  # Versions of async prior to 3.2.2 are vulnerable to prototype pollution.
  async: ^3.2.2
  # ReDoS vulnerability in older versions; dependents pulling debug <1 are unmaintained.
  debug: '>=3.1.0'
  # Later es5-ext releases included protestware prohibited by policy.
  es5-ext: 0.10.53
  # Aligns linting with React 19 behavior while upstream stabilizes the release.
  eslint-plugin-react-hooks: 6.1.0-canary-12bc60f5-20250613
  # micromatch 3 depends on vulnerable decode-uri-component 0.2.0.
  micromatch: ^4.0.0
  # Pins the 5.x line to its latest patched release for recent ReDoS advisories.
  'minimatch@>=5.0.0 <6.0.0': 5.1.9
  # Overrides exact 9.0.3 pins that are not matched by the broader descriptor.
  'minimatch@9.0.3': 9.0.9
  # Pins the 9.x line to its latest patched release for recent ReDoS advisories.
  'minimatch@>=9.0.0 <10.0.0': 9.0.9
  # Keeps react-is aligned with React.
  react-is: 19.1.0
  # Eliminates the dependency on the outdated string_decoder component.
  readable-stream: ^4.0.0 <4.4.2
  # Versions before 1.7.3 have an RCE vulnerability.
  shell-quote: ^1.7.3
  # dtslint pulls this indirectly through an outdated library; this use does not need cookies.
  tough-cookie: ^4.1.3

versioning:
  changelog:
    storage: repository
