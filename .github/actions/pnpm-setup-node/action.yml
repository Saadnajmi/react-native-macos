name: Setup pnpm and Node.js
description: Sets up pnpm and Node.js for Microsoft-owned workflows
inputs:
  node-version:
    description: The Node.js version to use
    required: false
    default: '22'
runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
